listen_addr: ":8080"
base_url: "https://admin.pds.example.com"

session:
  # 32+ byte hex string. If the file doesn't exist, the app will create one
  # with a random 32-byte secret on first start (mode 0600). Persist this
  # across restarts, otherwise sessions are invalidated on every boot.
  secret_file: "/var/lib/pds-pro/session-secret"
  secure: true
  max_age_sec: 86400

oauth:
  # Each provider block is optional. Configure as many as you want; the login
  # page renders one button per enabled provider. Subjects in the audit log
  # are namespaced as "<provider>|<provider-user-id>" so identities stay
  # unambiguous across providers.
  okta:
    org_url: "https://example.okta.com"
    client_id: "0oaXXXXXXXXXXXXXX"
    # File contents = the Okta client secret (single line, no quotes)
    client_secret_file: "/run/secrets/pds-pro/okta-client-secret"
    callback_url: "https://admin.pds.example.com/auth/okta/callback"

  # google:
  #   client_id: "XXXXXXXXXX.apps.googleusercontent.com"
  #   client_secret_file: "/run/secrets/pds-pro/google-client-secret"
  #   callback_url: "https://admin.pds.example.com/auth/google/callback"
  #   # scopes: ["email", "profile"]   # default

  # microsoft:
  #   # Azure AD / Entra ID via the goth microsoftonline provider.
  #   # The URL path uses goth's internal name: /auth/microsoftonline/callback
  #   client_id: "00000000-0000-0000-0000-000000000000"
  #   client_secret_file: "/run/secrets/pds-pro/microsoft-client-secret"
  #   callback_url: "https://admin.pds.example.com/auth/microsoftonline/callback"

  # facebook:
  #   client_id: "0000000000000000"
  #   client_secret_file: "/run/secrets/pds-pro/facebook-client-secret"
  #   callback_url: "https://admin.pds.example.com/auth/facebook/callback"
  #   # scopes: ["email"]              # default

  # twitter:
  #   # X (Twitter) via the goth twitterv2 provider — OAuth 1.0a against the
  #   # v2 API. Scopes are not configurable for this provider.
  #   # The URL path uses goth's internal name: /auth/twitterv2/callback
  #   client_id: "XXXXXXXXXXXXXXXX"
  #   client_secret_file: "/run/secrets/pds-pro/twitter-client-secret"
  #   callback_url: "https://admin.pds.example.com/auth/twitterv2/callback"

# Operators allowed to access the app. First match wins.
# An entry with `subject` matches the OAuth provider-prefixed subject
# (e.g. "okta|00uXXXXXXXX"). `email` is exact match; `email_domain`
# matches anyone with that email domain.
allowlist:
  - subject: "okta|00uXXXXXXXXXXXXXX"
    email: "alice@sgc.ai"
    roles: ["super-admin"]
  - email_domain: "sgc.ai"
    roles: ["instance-admin"]

# PDS instances this admin app can manage. Each instance's admin password
# must live in its own file readable by the app (mode 0640, owned by the
# pds-pro user).
instances:
  - name: "pds-foo"
    pds_host: "https://pds-foo.example.com"
    admin_password_file: "/run/secrets/pds-pro/pds-foo-admin-password"
  - name: "pds-bar"
    pds_host: "https://pds-bar.example.com"
    admin_password_file: "/run/secrets/pds-pro/pds-bar-admin-password"

audit:
  # JSON-lines audit log. One entry per admin action (and per login attempt).
  # Empty / unset = stdout.
  log_path: "/var/log/pds-pro/audit.log"

goat:
  # Path to the goat binary inside the container. The Dockerfile installs
  # it at /usr/local/bin/goat.
  binary_path: "/usr/local/bin/goat"
