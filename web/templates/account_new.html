{{define "content"}}
<p><a href="/instances/{{.Instance.Name}}/accounts">&larr; accounts</a></p>
<h2>New account on {{.Instance.Name}}</h2>
<form class="stacked" method="post" action="/instances/{{.Instance.Name}}/accounts">
  <label>Handle (e.g. alice.example.com)
    <input name="handle" required autocomplete="off">
  </label>
  <label>Email
    <input name="email" type="email" required autocomplete="off">
  </label>
  <label>Password (leave blank to auto-generate)
    <input name="password" type="text" autocomplete="off">
  </label>
  <button type="submit">Create</button>
</form>
{{end}}
